services:
  maestro:
    build:
      context: .
      target: deps
    command: sh -c "npm install --legacy-peer-deps 2>/dev/null; exec npx tsx watch apps/maestro/src/cli.ts"
    env_file: .env
    environment:
      CONDRIX_MAESTRO_HOST: "0.0.0.0"
      CONDRIX_MAESTRO_PORT: "9200"
      CONDRIX_MAESTRO_DB: /data/maestro.db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/maestro/node_modules
      - /app/libs/protocol/node_modules
      - maestro-data:/data
    ports:
      - "9200:9200"
      - "9201:9201"
    networks:
      - condrix
    restart: unless-stopped

  core:
    build:
      context: .
      target: deps
    command: sh -c "npm install --legacy-peer-deps 2>/dev/null; exec npx tsx watch apps/core/src/cli.ts"
    env_file: .env
    environment:
      CONDRIX_CORE_HOST: "0.0.0.0"
      CONDRIX_CORE_PORT: "9100"
      CONDRIX_CORE_CONTAINER: "true"
      CONDRIX_HOST_MOUNTS: "${CONDRIX_HOST_MOUNTS:-}"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/core/node_modules
      - /app/libs/protocol/node_modules
      - /app/libs/skills/node_modules
      - /app/libs/mcp-configs/node_modules
      - core-data:/root/.condrix
      - claude-data:/root/.claude
    ports:
      - "9100:9100"
    networks:
      - condrix
    restart: unless-stopped

  web:
    build:
      context: .
      target: deps
    # Install deps on startup (anonymous volumes override build-time node_modules),
    # then fix React 18/19 conflict and start Vite.
    command: >-
      sh -c "npm install --legacy-peer-deps 2>/dev/null;
             rm -rf /app/node_modules/react &&
             ln -sf /app/apps/client-web/node_modules/react /app/node_modules/react &&
             rm -rf /app/apps/client-web/node_modules/.vite &&
             exec npx vite apps/client-web --host 0.0.0.0 --port 80"
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/client-web/node_modules
      - /app/libs/protocol/node_modules
      - /app/libs/client-shared/node_modules
      - /app/libs/client-components/node_modules
    ports:
      - "5173:80"
    networks:
      - condrix
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      - maestro
      - core
      - web
    networks:
      - condrix
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  maestro-data:
  core-data:
  claude-data:

networks:
  condrix:
